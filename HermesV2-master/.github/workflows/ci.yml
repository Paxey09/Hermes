name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Lint and Test
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: make install
      
    - name: Run ESLint
      run: make lint
      continue-on-error: true
      
    - name: Run tests
      run: make test
      continue-on-error: true

  # Build Client
  build-client:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: make install
      
    - name: Build client
      run: make build-client
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-build
        path: client/dist
        retention-days: 7

  # Build Docker Images
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker images
      run: make docker-build
      
    - name: Test Docker containers
      run: |
        make docker-up
        sleep 10
        docker-compose ps
        make docker-down

  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run npm audit
      run: |
        cd client && npm audit --audit-level=moderate || true
        cd ../server && npm audit --audit-level=moderate || true
