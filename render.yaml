services:
  - type: web
    name: hermes-server
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENCLAUDE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FB_VERIFY_TOKEN
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_NAME
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: static
    name: hermes-client
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false